doc: |
  API interface definition for the Hex Single Motor Mini Drive.

  The first 2 bytes of each message contain the message message_code. The remainder 
  of the message contains data as defined below, writting the fields in order.
  as their bit representation, little-endian.

message_codes:

  NULL_MESSAGE_CODE: 
    message_code: 0x0000

  READOUT:
    message_code: 0x2020
    type: Readout

  STREAM_FULL_READOUTS:
    message_code: 0x2021
    type: StreamFullReadouts
    returns: FULL_READOUT
    returns_len: 'stream'

  GET_READOUTS_SNAPSHOT:
    message_code: 0x2022
    returns: READOUT
    returns_len: HISTORY_SIZE

  FULL_READOUT:
    message_code: 0x2023
    type: FullReadout

  SET_STATE_OFF:
    message_code: 0x2030
    
  SET_STATE_DRIVE_6_SECTOR:
    message_code: 0x2031
    type: BasicDriveCommand

  SET_STATE_TEST_ALL_PERMUTATIONS:
    message_code: 0x2032
    type: TestCommand
    
  SET_STATE_FREEWHEEL:
    message_code: 0x2034

  SET_STATE_TEST_GROUND_SHORT:
    message_code: 0x2036
    type: TestCommand
  SET_STATE_TEST_POSITIVE_SHORT:
    message_code: 0x2037
    type: TestCommand
  SET_STATE_TEST_U_DIRECTIONS:
    message_code: 0x2039
    type: TestCommand
  SET_STATE_TEST_U_INCREASING:
    message_code: 0x203a
    type: TestCommand
  SET_STATE_TEST_U_DECREASING:
    message_code: 0x203b
    type: TestCommand
  SET_STATE_TEST_V_INCREASING:
    message_code: 0x203c
    type: TestCommand
  SET_STATE_TEST_V_DECREASING:
    message_code: 0x203d
    type: TestCommand
  SET_STATE_TEST_W_INCREASING:
    message_code: 0x203e
    type: TestCommand
  SET_STATE_TEST_W_DECREASING:
    message_code: 0x203f
    type: TestCommand
  SET_STATE_HOLD_U_POSITIVE:
    message_code: 0x3020
    type: HoldCommand
  SET_STATE_HOLD_V_POSITIVE:
    message_code: 0x3021
    type: HoldCommand
  SET_STATE_HOLD_W_POSITIVE:
    message_code: 0x3022
    type: HoldCommand
  SET_STATE_HOLD_U_NEGATIVE:
    message_code: 0x3023
    type: HoldCommand
  SET_STATE_HOLD_V_NEGATIVE:
    message_code: 0x3024
    type: HoldCommand
  SET_STATE_HOLD_W_NEGATIVE:
    message_code: 0x3025
    type: HoldCommand
    
  SET_STATE_DRIVE_PERIODIC:
    message_code: 0x3040
    type: SetStateDrivePeriodic
  SET_STATE_DRIVE_SMOOTH:
    message_code: 0x4030
    type: SetStateDriveSmooth
  SET_STATE_DRIVE_TORQUE:
    message_code: 0x4031
    type: SetStateDriveTorque
  SET_STATE_DRIVE_BATTERY_POWER:
    message_code: 0x4032
    type: SetStateDriveBatteryPower
  SET_STATE_DRIVE_SPEED:
    message_code: 0x4033
    type: SetStateDriveSpeed
  SET_STATE_SEEK_ANGLE_WITH_POWER:
    message_code: 0x4034
    type: SetStateSeekAngleWithPower
  SET_STATE_SEEK_ANGLE_WITH_TORQUE:
    message_code: 0x4035
    type: SetStateSeekAngleWithTorque
  SET_STATE_SEEK_ANGLE_WITH_SPEED:
    message_code: 0x4036
    type: SetStateSeekAngleWithSpeed

  CURRENT_CALIBRATION:
    message_code: 0x4040
    type: CurrentCalibration
  GET_CURRENT_CALIBRATION:
    message_code: 0x4041
    returns: CURRENT_CALIBRATION
  SET_CURRENT_CALIBRATION:
    message_code: 0x4042
    type: CurrentCalibration
    returns: CURRENT_CALIBRATION
  RESET_CURRENT_CALIBRATION:
    message_code: 0x4043
    returns: CURRENT_CALIBRATION

  HALL_POSITIONS:
    message_code: 0x4044
    type: HallPositions
  GET_HALL_POSITIONS:
    message_code: 0x4045
    returns: HALL_POSITIONS
  SET_HALL_POSITIONS:
    message_code: 0x4046
    type: HallPositions
    returns: HALL_POSITIONS
  RESET_HALL_POSITIONS:
    message_code: 0x4047
    returns: HALL_POSITIONS

  CONTROL_PARAMETERS:
    message_code: 0x4049
    type: ControlParameters
  SET_CONTROL_PARAMETERS:
    message_code: 0x404a
    type: ControlParameters
    returns: CONTROL_PARAMETERS
  GET_CONTROL_PARAMETERS:
    message_code: 0x404b
    returns: CONTROL_PARAMETERS
  RESET_CONTROL_PARAMETERS:
    message_code: 0x404c
    returns: CONTROL_PARAMETERS

  SET_ANGLE:
    message_code: 0x4050
    type: SetAngle
  SAVE_SETTINGS_TO_FLASH:
    message_code: 0x4080  
  UNIT_TEST_OUTPUT:
    message_code: 0x5040
    type: UnitTestOutput
  RUN_UNIT_TEST_FUNKY_ATAN:
    message_code: 0x5042
    returns: UNIT_TEST_OUTPUT
  RUN_UNIT_TEST_FUNKY_ATAN_PART2:
    message_code: 0x5043
    returns: UNIT_TEST_OUTPUT
  RUN_UNIT_TEST_FUNKY_ATAN_PART3:
    message_code: 0x5044
    returns: UNIT_TEST_OUTPUT


definitions:
  MAX_MESSAGE_SIZE:
    doc: Maximum size of a message in bytes; used to allocate buffers for the messages.
    type: uint32
    const: 256
    
  HISTORY_SIZE:
    doc: Number of contiguous readouts to store in the history buffer for a snapshot.
    type: uint32
    const: 336

  UNIT_TEST_OUTPUT_SIZE:
    doc: Number of bytes in the unit test output; should be enough to store the output of the funky atan unit test.
    type: uint32
    const: 248

  PositiveNegativeTransition:
    type: uint16
    array_len: 2

  SectorTransitions:
    type: PositiveNegativeTransition
    array_len: 6

  SectorCenters:
    type: uint16
    array_len: 6

  UnitTestOutput:
    doc: Output data from unit test.
    type: uint8
    array_len: UNIT_TEST_OUTPUT_SIZE

  Readout:
    doc: |
      Basic readout of the motor driver internal state; can be recorded contiguously
      into a history buffer after a commanded event.

    struct:
      pwm_commands: 
        type: uint32
        doc: The PWM commands for the motor outputs; concatenated into a single value.

      readout_number:
        type: uint16
        doc: Readout number; used to identify the readout in the history.

      state_flags:
        type: uint16
        doc: Driver state flags; packed into a single 16-bit value.

      u_current:
        type: int16
        doc: Raw phase U current readout (ADC value).

      v_current:
        type: int16
        doc: Raw phase V current readout (ADC value).

      w_current:
        type: int16
        doc: Raw phase W current readout (ADC value).

      ref_readout:
        type: int16
        doc: |
          Raw reference readout (ADC value); this is the reference voltage for the current 
          readouts as seen by the amplifier. Needs to be subtracted from the phase readouts.

      u_current_diff:
        type: int16
        doc: Phase U current readout difference to previous readout.

      v_current_diff:
        type: int16
        doc: Phase V current readout difference to previous readout.

      w_current_diff:
        type: int16
        doc: Phase W current readout difference to previous readout.

      angle:
        type: int16
        doc: Best estimate for the rotor magnetic angle.

      angle_adjustment:
        type: int16
        doc: Error of the angle measured from EMF to the rotor angle prediction.

      angular_speed:
        type: int16
        doc: Best estimate for the rotor magnetic angular speed.

      vcc_voltage:
        type: int16
        doc: Instantaneous VCC voltage readout (ADC value); from resistance divider.
      
      emf_voltage_magnitude: 
        type: int16
        doc: |
          EMF voltage magnitude. The EMF is always along the beta direction, but we can have 
          errors in the measurements and the rotor position and thus we see alpha component 
          as well. We can rotate the EMF voltage vector fully to the beta direction and get 
          closer to the actual EMF voltage magnitude.

  StreamFullReadouts:
    doc: |
      Continuously send full readouts of the motor driver internal state.

    struct:
      stream_state:
        type: uint16
        doc: |
          Number of messages to send; the stream command should be repeated to keep sending messages.


  FullReadout:
    doc: |
      Complete readout of the motor driver internal state for exploration and data stream.
    
    struct_base: Readout
    
    struct:
      main_loop_rate:
        type: uint16
        doc: Tick rate; the number of main loop (communication and commands) updates per second.

      adc_update_rate:
        type: uint16
        doc: |
          ADC update rate; the number of ADC readouts per second. This is usually higher 
          than the main loop rate because we read the ADCs multiple times per main loop.

      temperature:
        type: uint16
        doc: Instantaneous temperature readout (ADC value); from the temperature sensor.

      live_max_pwm:
        type: uint16
        doc: Current maximum PWM allowed by the driver.

      cycle_start_tick:
        type: int16
        doc: |
          PWM counter value at the start of the control update. Should occur immediately 
          after the halfway point.

      cycle_end_tick:
        type: int16
        doc: |
          PWM counter value at the end of the control update. Should occur immediately 
          before the halfway point.

      direct_current:
        type: int16
        doc: Current in DQ0 coordinates; aligned with the rotor angle.

      quadrature_current:
        type: int16
        doc: Current in DQ0 coordinates; crossed with the rotor angle.

      direct_emf_voltage:
        type: int16
        doc: EMF voltage in DQ0 coordinates; aligned with the rotor angle.

      quadrature_emf_voltage:
        type: int16
        doc: EMF voltage in DQ0 coordinates; crossed with the rotor angle.

      total_power:
        type: int16
        doc: Total power used/given to VCC line (the battery usually).

      resistive_power:
        type: int16
        doc: Resistive power; the power dissipated in the phase resistances.

      emf_power:
        type: int16
        doc: |
          EMF power; the power used to drive the motor (which is reflected to the 
          inductors as back EMF).

      inductive_power:
        type: int16
        doc: Inductive power; the power pushed into the inductor magnetic fields.

      motor_constant:
        type: int16
        doc: |
          Motor constant; a measure of how strong the motor is. It is computed as the 
          ratio between the quadrature EMF voltage and the angular speed.

      inductor_angle:
        type: int16
        doc: The current angle.

      rotor_acceleration:
        type: int16
        doc: The measured acceleration of the rotor.

      rotations:
        type: int16
        doc: Integrated number of EMF deduced rotor angle rotations since startup.

      current_magnitude:
        type: int16
        doc: Magnitude of the phase current in the DQ0 coordinate frame.

      emf_angle_error_variance:
        type: int16
        doc: Variance of the EMF angle error; used to determine if the EMF angle is too noisy to update.

      lead_angle:
        type: int16
        doc: | 
          Lead angle for the motor driving; used to adjust the phase voltages to drive the 
          motor efficiently.

      target_pwm:
        type: int16
        doc: Target PWM value for the motor outputs, value set by the advanced control algorithms.

      secondary_target:
        type: int16
        doc: Target for the advanced control algorithms.

      seek_integral:
        type: int16
        doc: Spare debug output.


  BasicDriveCommand:
    struct:
      pwm_value:
        type: int16
        doc: PWM value to use for driving the motor in 6 sector commutation mode.
      timeout:
        type: uint16
        doc: Time in pwm periods to drive the motor before stopping.

  TestCommand:
    struct:
      pwm_value:
        type: uint16
        doc: PWM value to use for the test.
      take_snapshot:
        type: uint16
        doc: Whether to take a snapshot while running the test.

  HoldCommand:
    struct:
      pwm_value:
        type: uint16
        doc: PWM value to use for holding the position.
      timeout:
        type: uint16
        doc: Time in pwm periods to hold the position before stopping.

  SetStateDrivePeriodic:
    struct:
      pwm_value:
        type: uint16
        doc: PWM value to use for driving the motor.
      timeout:
        type: uint16
        doc: Time in pwm periods to drive the motor before stopping.
      angle:
        type: uint16
        doc: Starting angle.
      angular_speed:
        type: int16
        doc: Angular speed to drive the motor at.
      

  SetStateDriveSmooth:
    struct:
      pwm_value:
        type: uint16
        doc: PWM value to use for driving the motor.
      timeout:
        type: uint16
        doc: Time in pwm periods to drive the motor before stopping.

  SetStateDriveTorque:
    struct:
      target_current:
        type: int16
        doc: Target current in the quadrature direction; the driver will try to achieve this current by adjusting the PWM commands.
      timeout:
        type: uint16
        doc: Time in pwm periods to drive the motor before stopping.

  SetStateDriveBatteryPower:
    struct:
      target_power:
        type: int16
        doc: Target power draw from the battery; the driver will try to achieve this power by adjusting the PWM commands.
      timeout:
        type: uint16
        doc: Time in pwm periods to drive the motor before stopping.

  SetStateDriveSpeed:
    struct:
      target_speed:
        type: int16
        doc: Target angular speed for the motor; the driver will try to achieve this speed by adjusting the PWM commands.
      timeout:
        type: uint16
        doc: Time in pwm periods to drive the motor before stopping.

  SetStateSeekAngleWithPower:
    struct:
      target_rotation:
        type: int16
        doc: Target rotation for the motor; the driver will try to achieve this rotation by adjusting the PWM commands.
      target_angle:
        type: uint16
        doc: Target angle for the motor; the driver will try to achieve this angle by adjusting the PWM commands.
      timeout:
        type: uint16
        doc: Time in pwm periods to drive the motor before stopping.
      max_drive_power:
        type: uint16
        doc: Maximum power to use for driving the motor; used to prevent overheating and overcurrent.

  SetStateSeekAngleWithTorque:
    struct:
      target_rotation:
        type: int16
        doc: Target rotation for the motor; the driver will try to achieve this rotation by adjusting the PWM commands.
      target_angle:
        type: uint16
        doc: Target angle for the motor; the driver will try to achieve this angle by adjusting the PWM commands.
      timeout:
        type: uint16
        doc: Time in pwm periods to drive the motor before stopping.
      max_drive_current:
        type: uint16
        doc: Maximum current to use for driving the motor; used to prevent overheating and overcurrent.

  SetStateSeekAngleWithSpeed:
    struct:
      target_rotation:
        type: int16
        doc: Target rotation for the motor; the driver will try to achieve this rotation by adjusting the PWM commands.
      target_angle:
        type: uint16
        doc: Target angle for the motor; the driver will try to achieve this angle by adjusting the PWM commands.
      timeout:
        type: uint16
        doc: Time in pwm periods to drive the motor before stopping.
      max_drive_speed:
        type: uint16
        doc: Maximum speed to use for driving the motor; used to prevent overheating and overcurrent.

  CurrentCalibration:
    doc: |
      Calibration factors for the current sensors.

      The soldering joints vary during manufacturing and therefore they affect the total
      resistance of the shunt resistors. We can calibrate for this effect by multiplying
      the readout by a factor for each phase.
      
      For the v1 design, we shall improve the shunt resistors and soldering pad design to
      to improve the accuracy. We can then switch to automatically calibrating the phase
      resistance and motor inductance. For now we calibrate using the motor monitor app.

    struct:
      u_factor:
        type: int16
        doc: Adjustment factor for the U phase current readout.

      v_factor:
        type: int16
        doc: Adjustment factor for the V phase current readout.

      w_factor:
        type: int16
        doc: Adjustment factor for the W phase current readout.

      inductance_factor:
        type: int16
        doc: Adjustment factor for the motor inductance; used to calibrate the coil inductance.
      

  HallPositions:
    doc: |
      Hall sensor position calibration data.
      
      Apparently, millimiter precision in the placement of the hall sensor chips means an error up to 
      30 degrees in the electrical angle of the magnetic rotor. Note that for each physical rotation
      of the magnet there are N magnet poles times P coil pairs rotations of the electrical angle.
      
      With this big of an error, we need to calibrate the hall sensor positions using the angle
      inferred from the back EMF voltage induced in the coils.
      
    struct:
      sector_transition_angles:
        type: SectorTransitions
        doc: | 
          The angle at the transition to the current sector from the left and from the 
          right. By "left" I mean the hall sector has transitioned from a lower to a higher 
          number, the rotor has a positive speed and is rotating counter-clockwise (trigonometric 
          direction). The left angle is lower than the right angle. Note that the left angle 
          of a sector and the right angle of the previous sector do not coincide because the 
          hall sensors have a designed hysteresis that latches the output.

      sector_transition_variances:
        type: SectorTransitions
        doc: |
          The variance of the angles (it is expensive to compute the standard deviation with 
          a square root but we only need the variance, so we only store the variance).

      sector_center_angles:
        type: SectorCenters
        doc: The center angle of each sector; the average of the left and right angles.

      sector_center_variances:
        type: SectorCenters
        doc: The variance of the center angles; at the moment it represents the span of the hall sector.

  ControlParameters:
    doc: |
      Parameters used in the motor control loop; for detailed descriptions check the
      motor monitor page. It's useful to modify the values and inspect the changes to
      the respective variables in the readout while driving a physical motor.

    struct:
      rotor_angle_ki:
        type: int16
        doc: Magnet position integral gain.

      rotor_angular_speed_ki:
        type: int16
        doc: Magnet angular speed integral gain.

      rotor_acceleration_ki:
        type: int16
        doc: Averaging gain for the acceleration of the rotor.

      motor_constant_ki:
        type: int16
        doc: Motor constant integral gain.

      motor_direction:
        type: int16
        doc: Sign of the motor direction (positive by default, negative to reverse turning direction).

      incorrect_direction_threshold:
        type: int16
        doc: Number of incorrect direction detections before we flip our motor angle.

      max_pwm_change:
        type: int16
        doc: Maximum PWM adjustment per cycle.

      max_angle_change:
        type: int16
        doc: Maximum target angle change per cycle.

      min_emf_voltage:
        type: int16
        doc: Minimum EMF voltage to consider EMF detected (above the noise level)

      hall_angle_ki:
        type: int16
        doc: Integral gain for the hall angle adjustment (0 to ignore).

      lead_angle_control_ki:
        type: int16
        doc: Lead angle integral gain for efficient driving.

      torque_control_ki:
        type: int16
        doc: Torque control gain.

      battery_power_control_ki:
        type: int16
        doc: Battery power control gain.

      speed_control_ki:
        type: int16
        doc: Speed control gain.

      probing_angular_speed:
        type: int16
        doc: Probing angular speed for initial EMF detection.

      max_pwm_difference:
        type: int16
        doc: Maximum PWM difference from motor PWM required to compensate back EMF.

      emf_angle_error_variance_threshold:
        type: int16
        doc: Maximum EMF angle correction variance when it's too noisy to update the angle.

      min_emf_for_motor_constant:
        type: int16
        doc: Minium EMF voltage to compute the motor constant.

      max_resistive_power:
        type: int16
        doc: Maximum resistive power that can be dissipated in the motor coils.

      resistive_power_ki:
        type: int16
        doc: Resistive power long duration average observer gain.

      max_angular_speed:
        type: int16
        doc: Maximum angular speed of the motor.

      max_power_draw:
        type: int16
        doc: Maximum power draw from the battery (proxy for maximum current).

      power_draw_ki:
        type: int16
        doc: Power draw long duration average observer gain.

      max_pwm:
        type: int16
        doc: Maximum PWM value for the motor outputs.
      
      seek_via_torque_k_prediction:
        type: int16
        doc: Seek via torque, prediction duration factor for integral error.

      seek_via_torque_ki:
        type: int16
        doc: Seek via torque, integral gain for the PID control.

      seek_via_torque_kp:
        type: int16
        doc: Seek via torque, proportional gain for the PID control.

      seek_via_torque_kd:
        type: int16
        doc: Seek via torque, derivative gain for the PID control.

      seek_via_power_k_prediction:
        type: int16
        doc: Seek via power, prediction duration factor for integral error.

      seek_via_power_ki:
        type: int16
        doc: Seek via power, integral gain for the PID control.

      seek_via_power_kp:
        type: int16
        doc: Seek via power, proportional gain for the PID control.

      seek_via_power_kd:
        type: int16
        doc: Seek via power, derivative gain for the PID control.

      seek_via_speed_k_prediction:
        type: int16
        doc: Seek via speed, prediction duration factor for integral error.

      seek_via_speed_ki:
        type: int16
        doc: Seek via speed, integral gain for the PID control.

      seek_via_speed_kp:
        type: int16
        doc: Seek via speed, proportional gain for the PID control.

      seek_via_speed_kd:
        type: int16
        doc: Seek via speed, derivative gain for the PID control.

      phase_resistance:
        type: int16
        doc: Resistance of motor coils per phase (star configuration).

      phase_inductance:
        type: int16
        doc: Inductance of motor coils per phase (star configuration).

  SetAngle:
    struct:
      angle:
        type: uint16
        doc: Set the current angle of the motor; used for initial angle calibration.
